version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: finsense_db
    restart: always
    environment:
      POSTGRES_DB: finsense
      POSTGRES_USER: finsense_user
      POSTGRES_PASSWORD: finsense_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsense_user -d finsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsense_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://finsense_user:finsense_pass@db:5432/finsense
      SECRET_KEY: your-super-secret-jwt-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      BCRYPT_ROUNDS: 12
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml/models:/app/ml_models
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsense_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
